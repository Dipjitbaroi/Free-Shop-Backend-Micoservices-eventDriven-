# ============================================================
# Ingress Rules
# Replace freeshopbd.com with your actual domain.
# Backend traffic → api-gateway (port 3000)
# Frontend is deployed on Vercel (not on this cluster).
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: freeshop-ingress
  namespace: freeshop
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Rewrite applies via capture groups only when /api/v1 is matched
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Enable WebSocket support (for real-time features)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # SSL / TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.freeshopbd.com       # <-- Change this
      secretName: freeshop-tls
  rules:
    # Backend API (Frontend is deployed on Vercel, not on this VPS)
    - host: api.freeshopbd.com
      http:
        paths:
          # API Documentation (no rewrite - doesn't match /api/v1 pattern)
          - path: /api-docs
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          # API v1 routes with rewrite: /api/v1/(...) → /...
          # Capture groups: $1=/or empty, $2=everything after /api/v1
          - path: /api/v1(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          # Root and catch-all (no rewrite)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
