# Payment Service - Service-Specific Values
serviceName: payment-service

services:
  ports:
    payment-service: 3005
  # Payment service handles critical transactions
  resources:
    requests:
      cpu: 100m       # Matches original K8s
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2  # Protected for single-node
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
