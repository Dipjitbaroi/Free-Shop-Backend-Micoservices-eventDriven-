apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: freeshop
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
        - name: migrate-database
          image: ghcr.io/dipjitbaroi/freeshop-user-service:latest
          imagePullPolicy: Always
          command: ["/bin/sh"]
          args:
            - -c
            - |
              cd /app/services/user-service && \
              npx prisma migrate deploy && \
              node --import=tsx ./prisma/seed.ts
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: NODE_ENV
            - name: USER_DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/freeshop_user"
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: POSTGRES_PASSWORD
      containers:
        - name: user-service
          image: ghcr.io/dipjitbaroi/freeshop-user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            # Environment & Port Configuration (from ConfigMap)
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: NODE_ENV
            - name: PORT
              value: "3002"
            - name: USER_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: USER_SERVICE_PORT
            # Database Configuration (ConfigMap + Secrets)
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: POSTGRES_PASSWORD
            - name: USER_DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/freeshop_user"
            # Redis Configuration
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)"
            # RabbitMQ Configuration
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: RABBITMQ_PASS
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)"
            # JWT Configuration
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: JWT_SECRET
            - name: SERVICE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: SERVICE_AUTH_TOKEN
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: freeshop
spec:
  selector:
    app: user-service
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: freeshop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
