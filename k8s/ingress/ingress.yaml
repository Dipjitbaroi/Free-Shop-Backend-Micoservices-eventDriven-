# ============================================================
# Ingress Rules
# Replace freeshopbd.com with your actual domain.
# Backend traffic → api-gateway (port 3000)
# Frontend is deployed on Vercel (not on this cluster).
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: freeshop-ingress
  namespace: freeshop
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Enable WebSocket support (for real-time features)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # SSL / TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Path-specific rewrite: only rewrite /api/v1/(...), not /api-docs or /
    # See 'rules' section below for path matching
    nginx.ingress.kubernetes.io/configuration-snippet: |
      rewrite ^/api/v1(.*)$ $1 break;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.freeshopbd.com       # <-- Change this
      secretName: freeshop-tls
  rules:
    # Backend API (Frontend is deployed on Vercel, not on this VPS)
    - host: api.freeshopbd.com     # <-- Change this
      http:
        paths:
          # API Documentation (no path rewrite)
          - path: /api-docs(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /api-docs.json
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /api/v1(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          # regex above strips /api/v1 prefix so the gateway receives /health, /ready, etc.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
