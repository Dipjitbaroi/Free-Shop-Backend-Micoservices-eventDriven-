name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: ${{ github.repository_owner }}
  NAMESPACE: freeshop

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build all 10 service images in parallel via matrix strategy.
  # Each image is tagged with a short commit SHA (7 chars) for traceability,
  # plus 'latest' so the k8s manifests can use either tag.
  # Layer caching is scoped per-service to keep rebuilds fast.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to GHCR

    strategy:
      fail-fast: false         # don't cancel sibling jobs on one failure
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - product-service
          - order-service
          - payment-service
          - inventory-service
          - vendor-service
          - notification-service
          - analytics-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Produce a short deterministic SHA used as the image tag.
      # Stored in step output so it's the SAME value used in the deploy job.
      - name: Compute short SHA
        id: tag
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Test SSH (verbose)
        run: |
          mkdir -p /tmp/sshkey
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/sshkey/key
          chmod 600 /tmp/sshkey/key
          ssh -i /tmp/sshkey/key -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -vvv ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} exit || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Use a PAT with `read:packages` and `write:packages` (set as repo secret GHCR_TOKEN)
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize registry owner
        run: echo "REG_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64
          # Short SHA tag for precise rollouts; 'latest' for convenience
          tags: |
            ghcr.io/${{ env.REG_OWNER }}/freeshop-${{ matrix.service }}:${{ steps.tag.outputs.sha }}
            ghcr.io/${{ env.REG_OWNER }}/freeshop-${{ matrix.service }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
          # Per-service GHA cache — drastically reduces build time on reruns
          cache-from: type=gha,scope=build-${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=build-${{ matrix.service }}

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to VPS over SSH after ALL builds succeed.
  # Steps:
  #   1. Create / refresh GHCR pull secret in k8s (so k3s can pull private images)
  #   2. Patch default ServiceAccount to inherit the pull secret automatically
  #   3. git pull latest manifests on VPS
  #   4. Run database migrations for each service BEFORE pods start
  #   5. Deploy/upgrade via Helm with new image tag
  #   6. Wait for rollouts and print final status
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production    # enable manual approval gate in GitHub if desired

    steps:
      - name: Compute short SHA
        id: tag
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          # ── GitHub Actions variables ─────────────────────────────────
          SHORT_SHA:  ${{ steps.tag.outputs.sha }}
          GHCR_USER:  ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          NAMESPACE:  freeshop
          
          # ── Database & Cache ────────────────────────────────────────
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          
          # ── Message Queue ───────────────────────────────────────────
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASS: ${{ secrets.RABBITMQ_PASS }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          
          # ── JWT Authentication ──────────────────────────────────────
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          JWT_REFRESH_EXPIRES_IN: ${{ secrets.JWT_REFRESH_EXPIRES_IN }}
          
          # ── Admin & Encryption ──────────────────────────────────────
          ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          
          # ── OAuth / Social Login ────────────────────────────────────
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          FACEBOOK_CLIENT_ID: ${{ secrets.FACEBOOK_CLIENT_ID }}
          FACEBOOK_CLIENT_SECRET: ${{ secrets.FACEBOOK_CLIENT_SECRET }}
          FACEBOOK_CALLBACK_URL: ${{ secrets.FACEBOOK_CALLBACK_URL }}
          
          # ── File Storage (AWS S3) ───────────────────────────────────
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          
          # ── Cloudinary (Alternative to S3) ──────────────────────────
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          
          # ── Payment Gateways ────────────────────────────────────────
          BKASH_APP_KEY: ${{ secrets.BKASH_APP_KEY }}
          BKASH_APP_SECRET: ${{ secrets.BKASH_APP_SECRET }}
          BKASH_USERNAME: ${{ secrets.BKASH_USERNAME }}
          BKASH_PASSWORD: ${{ secrets.BKASH_PASSWORD }}
          BKASH_BASE_URL: ${{ secrets.BKASH_BASE_URL }}
          CALLBACK_BASE_URL: ${{ secrets.CALLBACK_BASE_URL }}
          EPS_MERCHANT_ID: ${{ secrets.EPS_MERCHANT_ID }}
          EPS_API_KEY: ${{ secrets.EPS_API_KEY }}
          EPS_SECRET_KEY: ${{ secrets.EPS_SECRET_KEY }}
          EPS_BASE_URL: ${{ secrets.EPS_BASE_URL }}
          
          # ── Email (SMTP) ────────────────────────────────────────────
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          
          # ── SMS Gateway ──────────────────────────────────────────────
          SMS_API_KEY: ${{ secrets.SMS_API_KEY }}
          SMS_API_SECRET: ${{ secrets.SMS_API_SECRET }}
          SMS_SENDER_ID: ${{ secrets.SMS_SENDER_ID }}
          
          # ── Twilio (SMS) ─────────────────────────────────────────────
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          
          # ── Firebase (Push Notifications) ────────────────────────────
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          debug:    true
          envs:     SHORT_SHA,GHCR_USER,GHCR_TOKEN,REPO_OWNER,NAMESPACE,POSTGRES_PASSWORD,REDIS_PASSWORD,MONGODB_URI,RABBITMQ_USER,RABBITMQ_PASS,RABBITMQ_URL,JWT_SECRET,JWT_REFRESH_SECRET,JWT_EXPIRES_IN,JWT_REFRESH_EXPIRES_IN,ADMIN_SECRET_KEY,ENCRYPTION_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_CALLBACK_URL,FACEBOOK_CLIENT_ID,FACEBOOK_CLIENT_SECRET,FACEBOOK_CALLBACK_URL,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION,AWS_S3_BUCKET,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,BKASH_APP_KEY,BKASH_APP_SECRET,BKASH_USERNAME,BKASH_PASSWORD,BKASH_BASE_URL,CALLBACK_BASE_URL,EPS_MERCHANT_ID,EPS_API_KEY,EPS_SECRET_KEY,EPS_BASE_URL,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASSWORD,EMAIL_FROM,SMS_API_KEY,SMS_API_SECRET,SMS_SENDER_ID,TWILIO_ACCOUNT_SID,TWILIO_AUTH_TOKEN,TWILIO_FROM_NUMBER,FIREBASE_PROJECT_ID,FIREBASE_CLIENT_EMAIL,FIREBASE_PRIVATE_KEY
          script_stop: true
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            REPO_OWNER_LC=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
            REGISTRY="ghcr.io/$REPO_OWNER_LC"

            echo "==================================================="
            echo " Deploying commit $SHORT_SHA → namespace $NAMESPACE"
            echo "==================================================="

            # ── Step 1: Create/refresh the GHCR image-pull secret ──────────
            # Uses --dry-run + apply so it's safe to re-run on every deploy.
            kubectl create secret docker-registry ghcr-pull-secret \
              --namespace="$NAMESPACE" \
              --docker-server=ghcr.io \
              --docker-username="$GHCR_USER" \
              --docker-password="$GHCR_TOKEN" \
              --dry-run=client -o yaml | kubectl apply -f -

            # ── Step 2: Patch default SA — all pods inherit pull secret ─────
            kubectl patch serviceaccount default \
              --namespace="$NAMESPACE" \
              -p '{"imagePullSecrets":[{"name":"ghcr-pull-secret"}]}' 2>/dev/null || true

            # ── Step 3: Pull latest manifests from GitHub (clone if missing) ─
            REPO_PATH=/opt/freeshop-backend
            REPO_URL="https://github.com/${REPO_OWNER}/Free-Shop-Backend-Micoservices-eventDriven-.git"

            if ! command -v git >/dev/null 2>&1; then
              echo "git not found on target host; please install git"
              exit 1
            fi

            # If a deploy key exists on the VPS, force git to use it for SSH
            if [ -f ~/.ssh/github_deploy ]; then
              chmod 600 ~/.ssh/github_deploy || true
              export GIT_SSH_COMMAND='ssh -i ~/.ssh/github_deploy -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes'
            fi

            if [ -d "$REPO_PATH/.git" ]; then
              echo "Updating manifests in $REPO_PATH"
              cd "$REPO_PATH"
              git fetch origin main
              if [ $? -ne 0 ]; then
                echo "git fetch failed"
                exit 1
              fi
              git reset --hard origin/main
              if [ $? -ne 0 ]; then
                echo "git reset failed"
                exit 1
              fi
            else
              echo "Cloning manifests into $REPO_PATH"
              mkdir -p "$(dirname "$REPO_PATH")"
              git clone --depth=1 "$REPO_URL" "$REPO_PATH"
              if [ $? -ne 0 ]; then
                echo "git clone failed"
                exit 1
              fi
            fi

            cd "$REPO_PATH"

            # ── Step 4: Run database migrations BEFORE pod restart ───────────
            # CRITICAL: Migrations must run before new pods start
            # This prevents race conditions and init container timeouts
            echo ""
            echo "--- Running database migrations (pre-deployment) ---"
            
            # Services with databases that need migration
            DB_SERVICES="auth-service user-service product-service order-service payment-service inventory-service vendor-service notification-service analytics-service"
            
            MIGRATION_FAILED=""
            for SERVICE in $DB_SERVICES; do
              DB_NAME="freeshop_$(echo $SERVICE | sed 's/-service//')"
              MIGRATION_POD="migrate-${SERVICE}-${SHORT_SHA}"
              IMAGE="$REGISTRY/freeshop-$SERVICE:$SHORT_SHA"
              
              echo "  → Running migrations for $SERVICE (image: $IMAGE)"
              
              # Create migration pod that runs migrations
              kubectl run "$MIGRATION_POD" \
                --image="$IMAGE" \
                --restart=Never \
                --namespace="$NAMESPACE" \
                --image-pull-policy=IfNotPresent \
                --command -- /bin/sh -c "npx prisma migrate deploy || true" 2>/dev/null || true
              
              # Wait for migration to complete (max 5 minutes)
              if kubectl wait --for=condition=Ready pod/"$MIGRATION_POD" \
                --namespace="$NAMESPACE" --timeout=300s 2>/dev/null; then
                echo "    ✓ Migration completed"
              else
                echo "    ! Migration timeout or failed (continuing - init container will retry)"
              fi
              
              # Clean up migration pod
              kubectl delete pod "$MIGRATION_POD" --namespace="$NAMESPACE" 2>/dev/null || true
            done

            # ── Step 5: Apply Kubernetes Secrets & ConfigMaps ─────────────────
            echo ""
            echo "--- Creating Kubernetes Secrets from GitHub Secrets ---"
            
            # Create Kubernetes Secret dynamically from GitHub Secrets (never stored in repo)
            # This uses kubectl create secret generic with --from-literal for each secret
            kubectl create secret generic freeshop-secrets \
              --namespace="$NAMESPACE" \
              --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
              --from-literal=REDIS_PASSWORD="$REDIS_PASSWORD" \
              --from-literal=MONGODB_URI="$MONGODB_URI" \
              --from-literal=RABBITMQ_USER="$RABBITMQ_USER" \
              --from-literal=RABBITMQ_PASS="$RABBITMQ_PASS" \
              --from-literal=RABBITMQ_URL="$RABBITMQ_URL" \
              --from-literal=JWT_SECRET="$JWT_SECRET" \
              --from-literal=JWT_REFRESH_SECRET="$JWT_REFRESH_SECRET" \
              --from-literal=JWT_EXPIRES_IN="$JWT_EXPIRES_IN" \
              --from-literal=JWT_REFRESH_EXPIRES_IN="$JWT_REFRESH_EXPIRES_IN" \
              --from-literal=ADMIN_SECRET_KEY="$ADMIN_SECRET_KEY" \
              --from-literal=ENCRYPTION_KEY="$ENCRYPTION_KEY" \
              --from-literal=GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
              --from-literal=GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
              --from-literal=GOOGLE_CALLBACK_URL="$GOOGLE_CALLBACK_URL" \
              --from-literal=FACEBOOK_CLIENT_ID="$FACEBOOK_CLIENT_ID" \
              --from-literal=FACEBOOK_CLIENT_SECRET="$FACEBOOK_CLIENT_SECRET" \
              --from-literal=FACEBOOK_CALLBACK_URL="$FACEBOOK_CALLBACK_URL" \
              --from-literal=AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
              --from-literal=AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
              --from-literal=AWS_REGION="$AWS_REGION" \
              --from-literal=AWS_S3_BUCKET="$AWS_S3_BUCKET" \
              --from-literal=CLOUDINARY_CLOUD_NAME="$CLOUDINARY_CLOUD_NAME" \
              --from-literal=CLOUDINARY_API_KEY="$CLOUDINARY_API_KEY" \
              --from-literal=CLOUDINARY_API_SECRET="$CLOUDINARY_API_SECRET" \
              --from-literal=BKASH_APP_KEY="$BKASH_APP_KEY" \
              --from-literal=BKASH_APP_SECRET="$BKASH_APP_SECRET" \
              --from-literal=BKASH_USERNAME="$BKASH_USERNAME" \
              --from-literal=BKASH_PASSWORD="$BKASH_PASSWORD" \
              --from-literal=BKASH_BASE_URL="$BKASH_BASE_URL" \
              --from-literal=CALLBACK_BASE_URL="$CALLBACK_BASE_URL" \
              --from-literal=EPS_MERCHANT_ID="$EPS_MERCHANT_ID" \
              --from-literal=EPS_API_KEY="$EPS_API_KEY" \
              --from-literal=EPS_SECRET_KEY="$EPS_SECRET_KEY" \
              --from-literal=EPS_BASE_URL="$EPS_BASE_URL" \
              --from-literal=SMTP_HOST="$SMTP_HOST" \
              --from-literal=SMTP_PORT="$SMTP_PORT" \
              --from-literal=SMTP_USER="$SMTP_USER" \
              --from-literal=SMTP_PASSWORD="$SMTP_PASSWORD" \
              --from-literal=EMAIL_FROM="$EMAIL_FROM" \
              --from-literal=SMS_API_KEY="$SMS_API_KEY" \
              --from-literal=SMS_API_SECRET="$SMS_API_SECRET" \
              --from-literal=SMS_SENDER_ID="$SMS_SENDER_ID" \
              --from-literal=TWILIO_ACCOUNT_SID="$TWILIO_ACCOUNT_SID" \
              --from-literal=TWILIO_AUTH_TOKEN="$TWILIO_AUTH_TOKEN" \
              --from-literal=TWILIO_FROM_NUMBER="$TWILIO_FROM_NUMBER" \
              --from-literal=FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
              --from-literal=FIREBASE_CLIENT_EMAIL="$FIREBASE_CLIENT_EMAIL" \
              --from-literal=FIREBASE_PRIVATE_KEY="$FIREBASE_PRIVATE_KEY" \
              --dry-run=client -o yaml | kubectl apply -f -
            echo "  ✓ Secrets created dynamically"

            # ── Step 6: Deploy/upgrade via Helm ──────────────────────────────
            echo ""
            echo "--- Deploying via Helm ---"
            
            # Set Helm chart path
            HELM_CHART="$REPO_PATH/helm/freeshop"
            
            # Check if helm is installed
            if ! command -v helm &> /dev/null; then
              echo "ERROR: helm not found on VPS"
              exit 1
            fi
            
            # Clean up old ConfigMap to avoid Helm ownership conflicts
            # (The ConfigMap from a previous manual deployment may exist without Helm metadata)
            echo "Cleaning up old ConfigMap if it exists..."
            kubectl delete configmap freeshop-config --namespace="$NAMESPACE" 2>/dev/null || true
            
            # ── Step 6a: Deploy each service separately with its config ──────────
            # Each service gets its own Helm release with service-specific values
            # This allows API Gateway to have minReplicas: 2, others minReplicas: 1
            echo ""
            echo "--- Deploying services via Helm (per-service configuration) ---"
            
            # Define services as space-separated list (not multiline array for SSH compatibility)
            SERVICES="api-gateway auth-service user-service product-service order-service payment-service inventory-service vendor-service notification-service analytics-service"
            
            HELM_FAILED=""
            for SERVICE in $SERVICES; do
              VALUES_FILE="$HELM_CHART/services/values-$SERVICE.yaml"
              
              if [ ! -f "$VALUES_FILE" ]; then
                echo "ERROR: values file not found: $VALUES_FILE"
                exit 1
              fi
              
              echo "  → Deploying $SERVICE..."
              
              # Deploy each service as a separate Helm release (single-line for SSH compatibility)
              if ! helm upgrade "$SERVICE" "$HELM_CHART" --namespace="$NAMESPACE" --install --create-namespace --values "$HELM_CHART/values.yaml" --values "$HELM_CHART/values-prod.yaml" --values "$VALUES_FILE" --set "image.tag=$SHORT_SHA" --set "serviceName=$SERVICE" --wait --timeout 10m --atomic 2>&1 | head -20; then
                echo "    ! Helm deployment for $SERVICE FAILED"
                HELM_FAILED="$HELM_FAILED $SERVICE"
              else
                echo "    ✓ $SERVICE deployed"
              fi
            done
            
            if [ -n "$HELM_FAILED" ]; then
              echo ""
              echo "ERROR: These services failed to deploy:$HELM_FAILED"
              exit 1
            fi
            
            echo "✓ Helm deployment successful"

            # ── Step 7: Wait for rollouts and verify ────────────────────────
            echo ""
            echo "--- Waiting for rollouts (300s timeout each) ---"
            SERVICES="api-gateway auth-service user-service product-service order-service payment-service inventory-service vendor-service notification-service analytics-service"
            
            FAILED=""
            for SERVICE in $SERVICES; do
              if ! kubectl rollout status "deployment/$SERVICE" --namespace="$NAMESPACE" --timeout=300s 2>/dev/null; then
                FAILED="$FAILED $SERVICE"
              fi
            done

            # ── Step 8: Print summary ────────────────────────────────────────
            echo ""
            echo "--- Pod Status ---"
            kubectl get pods --namespace="$NAMESPACE" --sort-by='.metadata.name'

            echo ""
            echo "--- HPA Status ---"
            kubectl get hpa --namespace="$NAMESPACE"

            echo ""
            echo "--- Helm Release Status (10 services) ---"
            helm list --namespace="$NAMESPACE"

            if [ -n "$FAILED" ]; then
              echo ""
              echo "ERROR: These services failed to roll out:$FAILED"
              exit 1
            fi

            echo ""
            echo "✓ Deploy complete — SHA $SHORT_SHA is live"
            echo ""
            echo "--- Deployment Notes ---"
            echo "• Database migrations ran BEFORE pod restart (zero race conditions)"
            echo "• Init containers configured as fallback migration safety net"
            echo "• Per-service Helm releases (10 total, one per service)"
            echo "• API Gateway: minReplicas=2, maxReplicas=2 (entry point redundancy)"
            echo "• Other services: minReplicas=1, maxReplicas=2 (single-node protected)"
            echo "• Resource allocations match original K8s manifests"
            echo "• All services using image tag: $SHORT_SHA"
