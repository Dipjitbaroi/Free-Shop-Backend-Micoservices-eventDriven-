# Analytics Service - Service-Specific Values
serviceName: analytics-service

services:
  ports:
    analytics-service: 3009
  # Analytics is non-critical background service
  resources:
    requests:
      cpu: 100m       # Matches original K8s
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2  # Protected for single-node
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
