# Auth Service - Service-Specific Values
# ========================================
# Handles authentication and JWT - critical path
serviceName: auth-service

services:
  ports:
    auth-service: 3001
  
  # Standard resources for microservice
  resources:
    requests:
      cpu: 100m       # Matches original K8s manifest
      memory: 256Mi   # Matches original K8s manifest
    limits:
      cpu: 500m
      memory: 512Mi
  
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2  # Protected for single-node
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
