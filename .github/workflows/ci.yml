name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Lint & type-check every package and service
  # ─────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    env:
      AUTH_DATABASE_URL: "postgresql://user:pass@localhost/dummy"
      USER_DATABASE_URL: "postgresql://user:pass@localhost/dummy"
      PRODUCT_DATABASE_URL: "postgresql://user:pass@localhost/dummy"
      ORDER_DATABASE_URL: "postgresql://user:pass@localhost/dummy"
      PAYMENT_DATABASE_URL: "postgresql://user:pass@localhost/dummy"
      INVENTORY_DATABASE_URL: "postgresql://user:pass@localhost/dummy"
      VENDOR_DATABASE_URL: "postgresql://user:pass@localhost/dummy"
      NOTIFICATION_DATABASE_URL: "postgresql://user:pass@localhost/dummy"
      ANALYTICS_DATABASE_URL: "postgresql://user:pass@localhost/dummy"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Setup pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install root workspace deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client for all services
        run: |
          for SERVICE in services/*/; do
            if [ -f "$SERVICE/prisma/schema.prisma" ]; then
              echo "Generating Prisma client for $SERVICE"
              pnpm -C "$SERVICE" exec prisma generate
            fi
          done

      - name: Build shared packages first
        run: |
          for PKG in packages/shared-types packages/shared-utils packages/shared-events packages/shared-middleware; do
            echo "Building $PKG..."
            (cd $PKG && pnpm run build) || true
          done

      - name: Type-check all services
        run: |
          EXIT=0
          for SERVICE_DIR in services/*/; do
            echo "--- Checking $SERVICE_DIR ---"
            (pnpm -C "$SERVICE_DIR" exec tsc --noEmit) || EXIT=1
          done
          exit $EXIT

  # ─────────────────────────────────────────────────────────────
  # Lint Dockerfiles with hadolint
  # ─────────────────────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint all Dockerfiles
        run: |
          docker run --rm -i hadolint/hadolint:latest-alpine hadolint \
            --failure-threshold error - < /dev/null || true
          for DFILE in services/*/Dockerfile; do
            echo "Linting $DFILE"
            docker run --rm -i hadolint/hadolint:latest-alpine hadolint \
              --failure-threshold error - < "$DFILE"
          done

  # ─────────────────────────────────────────────────────────────
  # Build Docker images (no push) to verify Dockerfiles compile.
  # Runs only on PRs targeting main — avoids redundant builds on
  # every dev push (the deploy pipeline handles actual pushes).
  # ─────────────────────────────────────────────────────────────
  build-test:
    name: Build test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - product-service
          - order-service
          - payment-service
          - inventory-service
          - vendor-service
          - notification-service
          - analytics-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=ci-${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=ci-${{ matrix.service }}
