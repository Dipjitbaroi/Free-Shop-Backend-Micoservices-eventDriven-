apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: freeshop
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: YOUR_REGISTRY/freeshop-payment-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
          env:
            # Environment & Port Configuration (from ConfigMap)
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: NODE_ENV
            - name: PORT
              value: "3005"
            - name: PAYMENT_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: PAYMENT_SERVICE_PORT
            # Database Configuration (ConfigMap + Secrets)
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: POSTGRES_PASSWORD
            - name: PAYMENT_DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/freeshop_payment"
            # Redis Configuration
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)"
            # RabbitMQ Configuration
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: freeshop-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: RABBITMQ_PASS
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: JWT_SECRET
            - name: BKASH_APP_KEY
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: BKASH_APP_KEY
            - name: BKASH_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: BKASH_APP_SECRET
            - name: BKASH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: BKASH_USERNAME
            - name: BKASH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: BKASH_PASSWORD
            - name: BKASH_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: BKASH_BASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: freeshop
spec:
  selector:
    app: payment-service
  ports:
    - port: 3005
      targetPort: 3005
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service-hpa
  namespace: freeshop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
