apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: freeshop
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: YOUR_REGISTRY/freeshop-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: API_GATEWAY_PORT
              value: "3000"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: REDIS_PASSWORD
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: RABBITMQ_PASS
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: freeshop-secrets
                  key: JWT_SECRET
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3001"
            - name: USER_SERVICE_URL
              value: "http://user-service:3002"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:3003"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:3004"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:3005"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service:3006"
            - name: VENDOR_SERVICE_URL
              value: "http://vendor-service:3007"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:3008"
            - name: ANALYTICS_SERVICE_URL
              value: "http://analytics-service:3009"
            - name: PUBLIC_API_URL
              value: "https://api.freeshopbd.com/api/v1"  # set to your live API base URL
            - name: CORS_ORIGIN
              value: "https://www.freeshopbd.com,https://freeshopbd.com,https://api.freeshopbd.com,http://localhost:3000"  # allow frontend (www + non-www), API and Swagger UI origins
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: freeshop
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: freeshop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
